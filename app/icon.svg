<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FF8C00"/>
      <stop offset="100%" stop-color="#D72323"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="#0D0B12"/>
  <text
    x="16"
    y="24"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="23"
    font-weight="bold"
    text-anchor="middle"
    fill="url(#grad)"
    filter="url(#glow)"
  >V</text>
</svg>
